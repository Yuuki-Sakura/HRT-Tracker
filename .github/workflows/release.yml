name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Archive & Release
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${{ github.run_number }}" >> "$GITHUB_ENV"
          echo "Version: $VERSION  Build: ${{ github.run_number }}"

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            Packages/HRTShared/.build
            ~/Library/Developer/Xcode/DerivedData
          key: spm-${{ runner.os }}-${{ hashFiles('Packages/HRTShared/Package.resolved', 'Packages/HRTShared/Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Import code-signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          echo "$P12_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import $RUNNER_TEMP/certificate.p12 \
            -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Archive iOS
        run: >
          xcodebuild archive
          -scheme "HRT-Tracker"
          -archivePath build/HRT-Tracker-iOS.xcarchive
          -destination 'generic/platform=iOS'
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGN_ENTITLEMENTS=HRT-Tracker/HRT_Tracker_OSS.entitlements
          SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) OPENSOURCE'
          MARKETING_VERSION=$VERSION
          CURRENT_PROJECT_VERSION=$BUILD_NUMBER

      - name: Package iOS IPA
        run: |
          mkdir -p build/ios/Payload
          cp -R build/HRT-Tracker-iOS.xcarchive/Products/Applications/HRT-Tracker.app build/ios/Payload/
          cd build/ios
          zip -r -9 HRT-Tracker.ipa Payload
          rm -rf Payload

      - name: Archive macOS
        run: >
          xcodebuild archive
          -scheme "HRT-Tracker"
          -archivePath build/HRT-Tracker-macOS.xcarchive
          -destination 'generic/platform=macOS'
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGN_ENTITLEMENTS=HRT-Tracker/HRT_Tracker_OSS.entitlements
          SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) OPENSOURCE'
          MARKETING_VERSION=$VERSION
          CURRENT_PROJECT_VERSION=$BUILD_NUMBER

      - name: Sign macOS app
        run: |
          APP_PATH="build/HRT-Tracker-macOS.xcarchive/Products/Applications/HRT-Tracker.app"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "Signing with identity: $IDENTITY"

          /usr/bin/codesign --force --deep --options runtime --timestamp \
            --entitlements HRT-Tracker/HRT_Tracker_macOS_Distribution.entitlements \
            --sign "$IDENTITY" \
            "$APP_PATH"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Create macOS DMG
        run: |
          cp -R build/HRT-Tracker-macOS.xcarchive/Products/Applications/HRT-Tracker.app build/
          hdiutil create -volname "HRT-Tracker" -srcfolder build/HRT-Tracker.app -ov -format UDZO build/HRT-Tracker.dmg

      - name: Notarize macOS DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit build/HRT-Tracker.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m

          xcrun stapler staple build/HRT-Tracker.dmg
          xcrun stapler validate build/HRT-Tracker.dmg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create ${{ github.ref_name }}
          --generate-notes
          build/ios/HRT-Tracker.ipa
          build/HRT-Tracker.dmg

      - name: Clean up keychain
        if: always()
        run: |
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
          rm -f $RUNNER_TEMP/certificate.p12
